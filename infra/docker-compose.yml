name: eduLearn

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: eduLearn_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - eduLearn_pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eduLearn_net

  redis:
    image: redis:7-alpine
    container_name: eduLearn_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - eduLearn_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eduLearn_net

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: eduLearn_server
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../models:/app/models:ro
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - eduLearn_net

  nginx:
    image: nginx:alpine
    container_name: eduLearn_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ws.conf:/etc/nginx/conf.d/ws.conf:ro
    depends_on:
      server:
        condition: service_started
    networks:
      - eduLearn_net

volumes:
  eduLearn_pgdata:
    name: eduLearn_pgdata
  eduLearn_redisdata:
    name: eduLearn_redisdata
  uploads_data:
    name: eduLearn_uploads

networks:
  eduLearn_net:
    name: eduLearn_net
    driver: bridge
